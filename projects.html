<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Proyectos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/style1.css">
  <style>
    .preview-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .preview-icon {
      font-size: 4rem;
      color: #0d6efd;
      display: block;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    /* TARJETAS */
.card {
  border-radius: 1rem;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s;
  cursor: pointer;
  background: #fff;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  background: #e6f0ff; /* azul muy suave */
}

/* BOTONES CENTRADOS */
.card-buttons {
  display: flex;
  justify-content: center; /* centra los botones */
  gap: 0.5rem; /* espacio entre botones */
  flex-wrap: wrap;
  margin-top: 1rem;
}

.card-buttons .btn {
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card-buttons .btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

  </style>
</head>
<body class="bg-dark text-light">

  <!-- HEADER -->
  <header class="navbar navbar-expand-lg navbar-dark bg-dark shadow fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-info" href="index.html">
        <i class="bi bi-code-slash"></i> Adherly Dev
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
              data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" 
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link active" href="projects.html">Proyectos</a></li>
          <li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
        </ul>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero text-center d-flex flex-column justify-content-center align-items-center vh-100 bg-dark text-light">
    <div>
      <h1 class="typing-text display-3 fw-bold">
        🚀 Mis <span class="text-info">Proyectos</span>
      </h1>
      <p class="lead mt-3">Explora, descarga y visualiza lo que he desarrollado.</p>
      <a href="#subirProyecto" class="btn btn-info btn-lg mt-4 rounded-pill">
        <i class="bi bi-upload"></i> Subir Proyecto
      </a>
    </div>
  </section>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="container py-5">

    <!-- Formulario -->
    <div id="subirProyecto" class="card shadow-lg border-0 rounded-4 mb-5 bg-light text-dark">
      <div class="card-body p-4">
        <h4 class="mb-4 text-primary">📤 Subir un nuevo proyecto</h4>
        <form id="uploadForm">
          <div class="mb-3">
            <label class="form-label">Título del Proyecto</label>
            <input type="text" name="titulo" class="form-control form-control-sm" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea name="descripcion" class="form-control form-control-sm" rows="2" required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Archivo (ZIP, PDF, Imagen, etc.)</label>
            <input type="file" name="archivo" class="form-control form-control-sm" required>
          </div>
          <button type="submit" class="btn btn-primary btn-sm w-100">
            <i class="bi bi-upload"></i> Subir Proyecto
          </button>
          <div id="mensajeUpload" class="mt-3"></div>
        </form>
      </div>
    </div>

    <!-- Listado de proyectos -->
    <h3 class="mb-4 fw-bold">📂 Proyectos Disponibles</h3>
    <div id="proyectosLista" class="row g-4"></div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-dark text-center text-light py-4 mt-5 border-top">
    <div class="container">
      <p class="mb-2">© 2025 Adherly Dev | Todos los derechos reservados</p>
      <div>
        <a href="#" class="text-info me-3"><i class="bi bi-github fs-4"></i></a>
        <a href="#" class="text-info me-3"><i class="bi bi-linkedin fs-4"></i></a>
        <a href="#" class="text-info"><i class="bi bi-envelope fs-4"></i></a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const uploadForm = document.getElementById("uploadForm");
    const proyectosLista = document.getElementById("proyectosLista");
    const mensajeUpload = document.getElementById("mensajeUpload");

    // 🔹 Obtener y mostrar proyectos
    async function cargarProyectos() {
      try {
        const res = await fetch("http://localhost:3000/proyectos");
        if (!res.ok) throw new Error("Error al cargar proyectos");
        const proyectos = await res.json();
        renderizarProyectos(proyectos);
      } catch (err) {
        console.error(err);
        proyectosLista.innerHTML = `<p class="text-danger">Error al cargar los proyectos.</p>`;
      }
    }

 function renderizarProyectos(proyectos) {
  proyectosLista.innerHTML = "";
  if (proyectos.length === 0) {
    proyectosLista.innerHTML = `<p class="text-muted">No hay proyectos disponibles todavía.</p>`;
    return;
  }

  proyectos.forEach((proyecto) => {
    const col = document.createElement("div");
    col.className = "col-md-4";

    // Detectar tipo de archivo para previsualización
    let previewHTML = "";
    const ext = proyecto.archivoNombre.split('.').pop().toLowerCase();

    if(["png","jpg","jpeg","gif","webp"].includes(ext)){
      previewHTML = `<img src="http://localhost:3000${proyecto.archivoURL}" class="preview-img">`;
    } else if(ext === "pdf"){
      previewHTML = `<i class="bi bi-file-earmark-pdf preview-icon"></i>`;
    } else {
      previewHTML = `<i class="bi bi-file-earmark-text preview-icon"></i>`;
    }

    col.innerHTML = `
      <div class="card shadow-lg border-0 rounded-4 h-100 bg-light text-dark">
        <div class="card-body d-flex flex-column">
          ${previewHTML}
          <h5 class="card-title fw-bold text-primary" id="titulo-${proyecto.id}">${proyecto.titulo}</h5>
          <p class="card-text" id="descripcion-${proyecto.id}">${proyecto.descripcion}</p>
          <small class="text-muted">📅 ${proyecto.fecha}</small>

          <div class="card-buttons mt-auto">
            <a href="http://localhost:3000${proyecto.archivoURL}" target="_blank" class="btn btn-success btn-sm">
              <i class="bi bi-eye"></i> Ver
            </a>
            <button class="btn btn-warning btn-sm" onclick="editarProyectoTarjeta(${proyecto.id})">
              <i class="bi bi-pencil"></i> Editar
            </button>
            <button class="btn btn-danger btn-sm" onclick="eliminarProyecto(${proyecto.id})">
              <i class="bi bi-trash"></i> Eliminar
            </button>
          </div>
        </div>
      </div>
    `;
    proyectosLista.appendChild(col);
  });
}

    // 🔹 Descargar automáticamente
    function descargarProyecto(url, nombre) {
      const link = document.createElement("a");
      link.href = `http://localhost:3000${url}`;
      link.download = nombre;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // 🔹 Editar directamente en la tarjeta
    function editarProyectoTarjeta(id) {
      const tituloEl = document.getElementById(`titulo-${id}`);
      const descripcionEl = document.getElementById(`descripcion-${id}`);

      const tituloActual = tituloEl.textContent;
      const descripcionActual = descripcionEl.textContent;

      tituloEl.innerHTML = `<input type="text" class="form-control form-control-sm mb-2" value="${tituloActual}" id="input-titulo-${id}">`;
      descripcionEl.innerHTML = `<textarea class="form-control form-control-sm" rows="2" id="input-descripcion-${id}">${descripcionActual}</textarea>`;

      const botonEditar = tituloEl.parentElement.querySelector(".btn-warning");
      botonEditar.innerHTML = `<i class="bi bi-check-lg"></i> Guardar`;
      botonEditar.classList.remove("btn-warning");
      botonEditar.classList.add("btn-success");
      botonEditar.onclick = async () => {
        const nuevoTitulo = document.getElementById(`input-titulo-${id}`).value.trim();
        const nuevaDescripcion = document.getElementById(`input-descripcion-${id}`).value.trim();
        if (!nuevoTitulo || !nuevaDescripcion) return alert("Debe completar ambos campos");

        await fetch(`http://localhost:3000/proyectos/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ titulo: nuevoTitulo, descripcion: nuevaDescripcion })
        });

        cargarProyectos();
      };
    }

    // 🔹 Subir proyecto
    uploadForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      mensajeUpload.textContent = "";
      const formData = new FormData(uploadForm);

      try {
        const res = await fetch("http://localhost:3000/upload", {
          method: "POST",
          body: formData
        });

        if (!res.ok) throw new Error("Error subiendo proyecto");
        const proyecto = await res.json();

        mensajeUpload.innerHTML = `<div class="alert alert-success">Proyecto "${proyecto.titulo}" subido correctamente ✅</div>`;
        cargarProyectos();
        uploadForm.reset();
      } catch (err) {
        console.error(err);
        mensajeUpload.innerHTML = `<div class="alert alert-danger">Error subiendo el proyecto ❌</div>`;
      }
    });

    // 🔹 Eliminar proyecto
    async function eliminarProyecto(id) {
      if (!confirm("¿Seguro que deseas eliminar este proyecto?")) return;

      await fetch(`http://localhost:3000/proyectos/${id}`, {
        method: "DELETE"
      });

      cargarProyectos();
    }

    // 🚀 Cargar proyectos al iniciar
    cargarProyectos();
  </script>

</body>
</html>
